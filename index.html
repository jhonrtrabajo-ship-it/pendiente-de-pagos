<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">
    <h2>💰 Pagos Pendientes</h2>

    <input type="text" id="celular" placeholder="Número de celular">

    <button class="btn-blue" onclick="buscar()">🔍 Buscar</button>

    <button class="btn-dark" onclick="generarPagos()">📨 Generar cobros</button>
  </div>

  <div class="card">
    <div id="total"></div>

    <div id="loading" style="display:none;">
      <img src="https://i.gifer.com/ZZ5H.gif" width="60">
      <p>Cargando...</p>
    </div>

    <div id="resultados"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
